[project]
name = "iac"
version = "0.1.0"
description = "Proyecto IAC - CRUD simple con Typer y JSON"
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "Mateo Carvajal Zapata" }
]

dependencies = [
  "typer>=0.9",
  "rich>=13.4"
]

[project.optional-dependencies]
dev = [
  "ruff>=0.15.0",
  "pytest>=9.0.2"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

