[tool.poetry]
name = "IAC"
version = "0.1.0"
description = "Sistema de gestión IAC con operaciones CRUD"
authors = ["Mateo Carvajal Zapata, Manuela Martinez Gil <carvajalzapatamateo@gmail.com>,<martinezgilmanuela@gmail.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.11"
typer = "^0.9"
rich = "^13.4"

[tool.poetry.group.dev.dependencies]
ruff = "^0.15.0"
pytest = "^9.0.2"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "C90"]
exclude = ["data", ".venv", "tests"]

[tool.pytest.ini_options]
pythonpath = ["src"]
